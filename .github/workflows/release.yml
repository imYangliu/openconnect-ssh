name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-cli:
    name: Linux CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: cargo build --manifest-path rust-cli/Cargo.toml --release

      - name: Package CLI
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="och-cli-${version}-linux-x86_64"
          root="dist/${package}"
          mkdir -p "${root}/bin" "${root}/libexec/och" "${root}/examples"
          install -m 0755 rust-cli/target/release/och "${root}/bin/och"
          install -m 0755 src/och-config.sh "${root}/libexec/och/och-config.sh"
          install -m 0755 src/och-setup.sh "${root}/libexec/och/och-setup.sh"
          install -m 0755 src/macos-vpnc-route-wrapper.sh "${root}/libexec/och/macos-vpnc-route-wrapper.sh"
          install -m 0755 src/och-sudo-askpass.sh "${root}/libexec/och/och-sudo-askpass.sh"
          install -m 0644 examples/ssh_config.example "${root}/examples/ssh_config.example"
          tar -czf "dist/${package}.tar.gz" -C "${root}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cli
          path: dist/*.tar.gz

  macos:
    name: macOS CLI and App
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: cargo build --manifest-path rust-cli/Cargo.toml --release

      - name: Build GUI
        run: swift build -c release

      - name: Package CLI
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="och-cli-${version}-darwin-arm64"
          root="dist/${package}"
          mkdir -p "${root}/bin" "${root}/libexec/och" "${root}/examples"
          install -m 0755 rust-cli/target/release/och "${root}/bin/och"
          install -m 0755 src/och-config.sh "${root}/libexec/och/och-config.sh"
          install -m 0755 src/och-setup.sh "${root}/libexec/och/och-setup.sh"
          install -m 0755 src/macos-vpnc-route-wrapper.sh "${root}/libexec/och/macos-vpnc-route-wrapper.sh"
          install -m 0755 src/och-sudo-askpass.sh "${root}/libexec/och/och-sudo-askpass.sh"
          install -m 0644 examples/ssh_config.example "${root}/examples/ssh_config.example"
          tar -czf "dist/${package}.tar.gz" -C "${root}" .

      - name: Package signed GUI app
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          if [[ -z "${SIGN_IDENTITY:-}" ]]; then
            echo "MACOS_SIGN_IDENTITY secret is required to publish the GUI app; refusing to upload an unsigned helper." >&2
            exit 2
          fi
          make signed-app APP_VERSION="${version#v}"
          ditto -c -k --keepParent ".build/release/OCH.app" "dist/OCHApp-${version}-darwin-arm64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux-cli
      - macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          files="$(find dist -maxdepth 1 -type f | sort)"
          if gh release view "${version}" >/dev/null 2>&1; then
            gh release upload "${version}" ${files} --clobber
          else
            prerelease_args=()
            if [[ "${version}" == *-* ]]; then
              prerelease_args+=(--prerelease)
            fi
            gh release create "${version}" ${files} --title "${version}" --generate-notes "${prerelease_args[@]}"
          fi
