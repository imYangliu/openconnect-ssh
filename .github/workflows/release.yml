name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-cli:
    name: Linux CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: cargo build --manifest-path rust-cli/Cargo.toml --release

      - name: Package CLI
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="och-cli-${version}-linux-x86_64"
          root="dist/${package}"
          mkdir -p "${root}/bin" "${root}/libexec/och" "${root}/examples"
          install -m 0755 rust-cli/target/release/och "${root}/bin/och"
          install -m 0755 src/och-config.sh "${root}/libexec/och/och-config.sh"
          install -m 0755 src/och-setup.sh "${root}/libexec/och/och-setup.sh"
          install -m 0755 src/macos-vpnc-route-wrapper.sh "${root}/libexec/och/macos-vpnc-route-wrapper.sh"
          install -m 0755 src/och-sudo-askpass.sh "${root}/libexec/och/och-sudo-askpass.sh"
          install -m 0644 examples/ssh_config.example "${root}/examples/ssh_config.example"
          tar -czf "dist/${package}.tar.gz" -C "${root}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-cli
          path: dist/*.tar.gz

  macos:
    name: macOS CLI and App
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CLI
        run: cargo build --manifest-path rust-cli/Cargo.toml --release

      - name: Build GUI
        run: swift build -c release

      - name: Package CLI
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          package="och-cli-${version}-darwin-arm64"
          root="dist/${package}"
          mkdir -p "${root}/bin" "${root}/libexec/och" "${root}/examples"
          install -m 0755 rust-cli/target/release/och "${root}/bin/och"
          install -m 0755 src/och-config.sh "${root}/libexec/och/och-config.sh"
          install -m 0755 src/och-setup.sh "${root}/libexec/och/och-setup.sh"
          install -m 0755 src/macos-vpnc-route-wrapper.sh "${root}/libexec/och/macos-vpnc-route-wrapper.sh"
          install -m 0755 src/och-sudo-askpass.sh "${root}/libexec/och/och-sudo-askpass.sh"
          install -m 0644 examples/ssh_config.example "${root}/examples/ssh_config.example"
          tar -czf "dist/${package}.tar.gz" -C "${root}" .

      - name: Package GUI app
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          app=".build/release/OCHApp.app"
          rm -rf "${app}"
          mkdir -p "${app}/Contents/MacOS"
          mkdir -p "${app}/Contents/Resources/bin"
          mkdir -p "${app}/Contents/Resources/libexec/och"
          cp .build/release/OCHApp "${app}/Contents/MacOS/OCHApp"
          cp -R .build/release/OCH_OCHApp.bundle "${app}/OCH_OCHApp.bundle"
          install -m 0755 rust-cli/target/release/och "${app}/Contents/Resources/bin/och"
          install -m 0755 src/och-config.sh "${app}/Contents/Resources/libexec/och/och-config.sh"
          install -m 0755 src/och-setup.sh "${app}/Contents/Resources/libexec/och/och-setup.sh"
          install -m 0755 src/macos-vpnc-route-wrapper.sh "${app}/Contents/Resources/libexec/och/macos-vpnc-route-wrapper.sh"
          install -m 0755 src/och-sudo-askpass.sh "${app}/Contents/Resources/libexec/och/och-sudo-askpass.sh"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '  <key>CFBundleExecutable</key>' \
            '  <string>OCHApp</string>' \
            '  <key>CFBundleIdentifier</key>' \
            '  <string>io.github.imyangliu.och</string>' \
            '  <key>CFBundleName</key>' \
            '  <string>OCH</string>' \
            '  <key>CFBundleDisplayName</key>' \
            '  <string>OCH</string>' \
            '  <key>CFBundlePackageType</key>' \
            '  <string>APPL</string>' \
            '  <key>CFBundleVersion</key>' \
            "  <string>${version}</string>" \
            '  <key>CFBundleShortVersionString</key>' \
            "  <string>${version#v}</string>" \
            '</dict>' \
            '</plist>' \
            > "${app}/Contents/Info.plist"
          ditto -c -k --keepParent "${app}" "dist/OCHApp-${version}-darwin-arm64.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - linux-cli
      - macos

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          files="$(find dist -maxdepth 1 -type f | sort)"
          if gh release view "${version}" >/dev/null 2>&1; then
            gh release upload "${version}" ${files} --clobber
          else
            gh release create "${version}" ${files} --title "${version}" --generate-notes
          fi
